<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Work Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}
iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<iframe id="pdfFrame" src="download-work-order.pdf"></iframe>

<script>
    const frame = document.getElementById("pdfFrame");

    frame.onload = function() {
        setTimeout(function() {
            try {
                frame.contentWindow.focus();
                frame.contentWindow.print();
            } catch (e) {
                window.print();
            }
        }, 1500);
    };
</script>

</body>
</html>
